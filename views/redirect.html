<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleporting... Pookie Search</title>
    <link rel="stylesheet" href="/css/redirect.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/7e4f5f82d0.js" crossorigin="anonymous">
    </script>
</head>

<body>
    <main class="page">
        <img src="/images/psearch.png" alt="Pookie Search" class="logo">
        <div class="card">
            <div class="icon">
                <i class="fas fa-paper-plane"></i>
            </div>
            <h1>Teleporting you to your destination...</h1>
            <p id="statusText">Preparing the portal.</p>
            <div class="progressBar">
                <div id="progress" class="progress"></div>
            </div>
            <div id="destination" class="destination">Unknown Destination</div>
            <div class="countdown">Redirecting in<span id="countdown">2</span>seconds...</div>
            <button id="redirectButton" class="redirectButton">Go Now</button>
        </div>

        <footer>Pookie Search • Safe Redirect</footer>
    </main>
    <script src="/js/redirect.js"></script>
</body>
</html>
